<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DHTTT18A E-Commerce</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <!-- Demo-only client. Replace with a proper React build pipeline for production. -->
    <script type="text/babel">
      const { useState } = React;

      const App = () => {
        const [query, setQuery] = useState('');

        return (
          <div className="app-shell">
            <header className="container py-4">
              <h1 className="display-5 fw-bold">DHTTT18A Store</h1>
              <p className="text-muted">Microservice commerce platform.</p>
            </header>

            <main className="container pb-5">
              <div className="row g-4">
                <div className="col-lg-8">
                  <div className="card shadow-sm">
                    <div className="card-body">
                      <h2 className="h5 fw-semibold">Search Products</h2>
                      <div className="input-group">
                        <input
                          className="form-control"
                          placeholder="Search products"
                          value={query}
                          onChange={(event) => setQuery(event.target.value)}
                        />
                        <button className="btn btn-dark" type="button">
                          Search
                        </button>
                      </div>
                      <p className="text-muted mt-3">
                        Hook this up to `/api/products?search=` via the API Gateway.
                      </p>
                    </div>
                  </div>
                </div>

                <div className="col-lg-4">
                  <div className="card border-0 shadow-sm bg-dark text-white">
                    <div className="card-body">
                      <h2 className="h5 fw-semibold">Quick Actions</h2>
                      <ul className="list-unstyled small">
                        <li className="mb-2">Create account</li>
                        <li className="mb-2">Manage cart</li>
                        <li className="mb-2">Track orders</li>
                      </ul>
                    </div>
                  </div>
                </div>
              </div>
            </main>
          </div>
        );
      };

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
